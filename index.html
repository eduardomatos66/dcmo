<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Painel de Máquina</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <div class="status-area">
      <div class="training-module" id="training-module">
        <div class="training-header">
          <span class="training-title">DCM TRAINING MODULE</span>
          <div class="training-controls">
            <label class="highlight-toggle">
              <input type="checkbox" id="highlight-targets-cb"> Show Targets
            </label>
            <select id="scenario-selector" class="scenario-selector"></select>
            <button id="reset-scenario-btn" class="reset-btn">Reset</button>
            <button id="qr-code-btn" class="qr-btn" title="Connect Mobile Device">📱 QR</button>
          </div>
        </div>
        <div class="training-instruction" id="training-instruction">
          Waiting for scenario initialization...
        </div>
      </div>
      <div class="digital-log">
        <div class="log-header">DIAGNOSTICS & STATUS LOG</div>
        <div id="log-content" class="log-content">
          <div class="log-entry system">> SYSTEM INITIALIZED</div>
        </div>
      </div>
    </div>

    <div class="panel-area">
      <div class="panel-grid" id="panel-grid">
        <!-- Botões serão inseridos dinamicamente aqui via JavaScript -->
      </div>
      <div class="target-legend" id="target-legend" style="display: none;">
        <div class="legend-item"><span class="legend-color legend-purple"></span> Interaction Target</div>
        <div class="legend-item"><span class="legend-color legend-yellow"></span> Visual Verification</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>

  <!-- QR Code Modal -->
  <div id="qr-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">CONNECT DEVICE</span>
        <button class="modal-close" id="qr-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p>Scan to open simulator on your mobile device:</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://dcmo.vercel.app/" alt="QR Code" class="qr-image" />
        <p class="qr-url">https://dcmo.vercel.app/</p>
      </div>
    </div>
  </div>
</body>

</html>
