<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCM Lockout Layout</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/lockout-layout.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="lockout-app" class="lockout-app">
    <!-- Sidebar / List of areas -->
    <aside class="lockout-sidebar">
      <div class="sidebar-header">
        <h2>LOCKOUT SCENARIOS</h2>
        <p>Select a scenario to highlight the required lockout points</p>
        
        <button id="dev-align-btn" style="display: none; margin-top: 15px; padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;">
          🛠️ Enable Tag Alignment Mode
        </button>
      </div>
      <ul class="area-list" id="area-list">
        <!-- List items will be generated by JS -->
      </ul>
      <a href="/" class="back-btn">← Back to Home</a>
    </aside>

    <!-- Main View / Digital Floor Plan -->
    <main class="lockout-main">
      <div class="panel-viewer">
        <div class="layout-container">
          <!-- UNTAGGED BACKGROUND IMAGE -->
          <img class="layout-image" src="/assets/untagged-dcm-layout.png" alt="DCM Lockout Layout" />

          <!-- E TAGS -->
          <div class="lockout-tag e-tag" style="top: 7.78%; left: 10.44%;">E-7</div>
          <div class="lockout-tag e-tag" style="top: 8.62%; left: 38.49%;">E-6</div>
          <div class="lockout-tag e-tag" style="top: 5.26%; left: 71.02%;">E-5</div>
          <div class="lockout-tag e-tag" style="top: 8.91%; left: 74.16%;">E-11</div>
          <div class="lockout-tag e-tag" style="top: 13.01%; left: 76%;">E-1</div>

          <div class="lockout-tag e-tag" style="top: 32.7%; left: 6.17%;">E-8</div>
          <div class="lockout-tag e-tag" style="top: 83.38%; left: 15.5%;">E-9</div>
          <div class="lockout-tag e-tag" style="top: 90.51%; left: 29.17%;">E-12</div>
          <div class="lockout-tag e-tag" style="top: 91.64%; left: 48.61%;">E-10</div>

          <div class="lockout-tag e-tag" style="top: 73%; left: 75%;">E-4</div>
          <div class="lockout-tag e-tag" style="top: 73.55%; left: 93.41%;">E-2</div>
          <div class="lockout-tag e-tag" style="top: 92.06%; left: 93.41%;">E-3</div>

          <!-- A TAGS -->
          <div class="lockout-tag a-tag" style="top: 4.1%; left: 27.36%;">A-2</div>
          <div class="lockout-tag a-tag" style="top: 20%; left: 82%;">A-1</div>
          <div class="lockout-tag a-tag" style="top: 23%; left: 82%;">A-7</div>

          <div class="lockout-tag a-tag" style="top: 35.54%; left: 6.35%;">A-3</div>
          <div class="lockout-tag a-tag" style="top: 52.55%; left: 9.52%;">A-5</div>
          <div class="lockout-tag a-tag" style="top: 83.61%; left: 20.82%;">A-4</div>
          <div class="lockout-tag a-tag" style="top: 89.86%; left: 39.03%;">A-6</div>

          <!-- C TAGS -->
          <div class="lockout-tag c-tag" style="top: 11.46%; left: 23.8%;">C-3</div>
          <div class="lockout-tag c-tag" style="top: 62.84%; left: 68.86%;">C-1</div>
          <div class="lockout-tag c-tag" style="top: 91.09%; left: 44.47%;">C-2</div>

        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/lockout-layout.js"></script>
</body>
</html>
