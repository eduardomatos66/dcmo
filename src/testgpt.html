<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DCM Lockout Layout</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .toolbar {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        .toolbar button:hover {
            transform: scale(1.03);
        }

        .toggle-e {
            background: #d97b00;
        }

        .toggle-a {
            background: #1f5cff;
        }

        .toggle-c {
            background: #2c9b3f;
        }

        .layout-container {
            position: relative;
            width: 1200px;
            max-width: 100%;
            margin: auto;
            background: white;
            border: 3px solid #222;
            overflow: hidden;
        }

        .layout-image {
            width: 100%;
            display: block;
        }

        .tag {
            position: absolute;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            color: #111;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
            transition: opacity 0.25s ease;
        }

        .e-tag {
            background: #f4a261;
        }

        .a-tag {
            background: #5b8cff;
            color: white;
        }

        .c-tag {
            background: #8bd17c;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <button class="toggle-e" onclick="toggleTags('e-tag')">
            Toggle E Lockout
        </button>

        <button class="toggle-a" onclick="toggleTags('a-tag')">
            Toggle A Lockout
        </button>

        <button class="toggle-c" onclick="toggleTags('c-tag')">
            Toggle C Lockout
        </button>
    </div>

    <div class="layout-container">

        <!-- BACKGROUND IMAGE -->
        <img class="layout-image" src="20260528_033655.jpg" alt="DCM Lockout Layout" />

        <!-- E TAGS -->
        <div class="tag e-tag" style="top: 72px; left: 120px;">E-7</div>
        <div class="tag e-tag" style="top: 88px; left: 520px;">E-6</div>
        <div class="tag e-tag" style="top: 65px; left: 950px;">E-5</div>
        <div class="tag e-tag" style="top: 110px; left: 995px;">E-11</div>
        <div class="tag e-tag" style="top: 145px; left: 995px;">E-1</div>

        <div class="tag e-tag" style="top: 300px; left: 30px;">E-8</div>
        <div class="tag e-tag" style="top: 705px; left: 60px;">E-9</div>
        <div class="tag e-tag" style="top: 760px; left: 480px;">E-12</div>
        <div class="tag e-tag" style="top: 760px; left: 700px;">E-10</div>

        <div class="tag e-tag" style="top: 500px; left: 1030px;">E-4</div>
        <div class="tag e-tag" style="top: 620px; left: 1240px;">E-2</div>
        <div class="tag e-tag" style="top: 760px; left: 1230px;">E-3</div>

        <!-- A TAGS -->
        <div class="tag a-tag" style="top: 40px; left: 350px;">A-2</div>
        <div class="tag a-tag" style="top: 150px; left: 1100px;">A-1</div>
        <div class="tag a-tag" style="top: 185px; left: 1100px;">A-7</div>

        <div class="tag a-tag" style="top: 330px; left: 25px;">A-3</div>
        <div class="tag a-tag" style="top: 520px; left: 70px;">A-5</div>
        <div class="tag a-tag" style="top: 760px; left: 270px;">A-4</div>
        <div class="tag a-tag" style="top: 760px; left: 520px;">A-6</div>

        <!-- C TAGS -->
        <div class="tag c-tag" style="top: 115px; left: 300px;">C-3</div>
        <div class="tag c-tag" style="top: 540px; left: 880px;">C-1</div>
        <div class="tag c-tag" style="top: 760px; left: 610px;">C-2</div>

    </div>

    <script>
        function toggleTags(className) {
            const tags = document.querySelectorAll("." + className);

            tags.forEach(tag => {
                tag.classList.toggle("hidden");
            });
        }
    </script>

</body>

</html>
